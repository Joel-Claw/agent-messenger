name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  server-binaries:
    name: Build Server Binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o ../dist/agent-messenger-linux-amd64 .

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o ../dist/agent-messenger-linux-arm64 .

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o ../dist/agent-messenger-darwin-amd64 .

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o ../dist/agent-messenger-darwin-arm64 .

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o ../dist/agent-messenger-windows-amd64.exe .

      - name: Build migrate tool (Linux arm64)
        run: GOOS=linux GOARCH=arm64 go build -o ../dist/am-migrate-linux-arm64 ./cmd/am-migrate

      - name: Build migrate tool (Linux amd64)
        run: GOOS=linux GOARCH=amd64 go build -o ../dist/am-migrate-linux-amd64 ./cmd/am-migrate

      - uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: dist/

  webchat-build:
    name: Build WebChat
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webchat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: webchat-dist
          path: webchat/dist/

  release:
    name: Create Release
    needs: [server-binaries, webchat-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          find . -type f -exec sha256sum {} \; > ../checksums.txt
          cd ..

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/**
            checksums.txt