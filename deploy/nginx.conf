# Agent Messenger — nginx Reverse Proxy Configuration

# Place in /etc/nginx/sites-available/messenger
# Then: sudo ln -s /etc/nginx/sites-available/messenger /etc/nginx/sites-enabled/

server {
    listen 443 ssl http2;
    server_name messenger.example.com;

    ssl_certificate /etc/ssl/certs/messenger.example.com.pem;
    ssl_certificate_key /etc/ssl/private/messenger.example.com.key;

    # WebSocket support — critical for real-time messaging
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — must be higher than server heartbeat (30s)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name messenger.example.com;
    return 301 https://$host$request_uri;
}